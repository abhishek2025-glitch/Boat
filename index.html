<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAELSTROM - Survive the Sea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pirata+One&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Pirata One', cursive; user-select: none; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        
        /* Custom UI Elements */
        .health-bar-container { background: rgba(0,0,0,0.5); border: 2px solid #d4af37; border-radius: 4px; width: 200px; height: 20px; }
        .health-bar-fill { background: #e11d48; height: 100%; width: 100%; transition: width 0.2s; }
        .xp-bar-container { background: rgba(0,0,0,0.5); border: 2px solid #3b82f6; border-radius: 4px; width: 100%; height: 12px; margin-top: 4px; }
        .xp-bar-fill { background: #60a5fa; height: 100%; width: 0%; transition: width 0.2s; }
        
        .upgrade-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid #d4af37; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
        .upgrade-card:hover { transform: translateY(-5px) scale(1.05); border-color: #fef08a; }
        
        /* Stunning Pirate Virtual Joystick */
        #joystick-zone { 
            position: absolute; 
            width: 140px; 
            height: 140px; 
            background: radial-gradient(circle, rgba(20,20,30,0.8) 0%, rgba(10,10,15,0.9) 100%); 
            border: 4px solid #d4af37; 
            border-radius: 50%; 
            display: none; 
            pointer-events: none; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.5); 
            z-index: 100;
            background-image: 
                linear-gradient(to bottom, transparent 48%, rgba(212,175,55,0.3) 48%, rgba(212,175,55,0.3) 52%, transparent 52%),
                linear-gradient(to right, transparent 48%, rgba(212,175,55,0.3) 48%, rgba(212,175,55,0.3) 52%, transparent 52%);
        }
        #joystick-knob { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 60px; 
            height: 60px; 
            background: radial-gradient(circle, #fef08a 0%, #d4af37 60%, #b45309 100%); 
            border: 2px solid #78350f; 
            border-radius: 50%; 
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 15px rgba(0,0,0,0.6), inset 0 5px 5px rgba(255,255,255,0.6);
            transition: transform 0s;
        }
        #joystick-knob.released {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Floating Text */
        .damage-text { position: absolute; color: white; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; animation: floatUp 0.8s forwards; opacity: 1; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- WebGL Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Main UI Overlay -->
    <div id="ui-main" class="ui-layer p-4">
        
        <!-- Top HUD -->
        <div id="hud" class="w-full flex justify-between items-start hidden">
            <!-- Left: HP & XP -->
            <div>
                <div class="text-2xl text-yellow-400 drop-shadow-md">HP</div>
                <div class="health-bar-container"><div id="hp-fill" class="health-bar-fill"></div></div>
                <div class="text-lg text-blue-300 drop-shadow-md mt-2">LVL <span id="level-display">1</span></div>
                <div class="xp-bar-container"><div id="xp-fill" class="xp-bar-fill"></div></div>
            </div>
            
            <!-- Center: Timer -->
            <div class="text-center">
                <div id="timer-display" class="text-5xl text-white drop-shadow-[0_2px_2px_rgba(0,0,0,1)]">00:00</div>
            </div>
            
            <!-- Right: Doubloons -->
            <div class="text-right">
                <div class="text-2xl text-yellow-400 drop-shadow-md">🪙 <span id="coin-display">0</span></div>
                <div class="text-lg text-white mt-2">WAVE <span id="wave-display">1</span></div>
            </div>
        </div>

        <!-- Virtual Joystick -->
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="ui-layer interactive bg-black/80 flex items-center justify-center backdrop-blur-sm z-50">
        <div class="text-center max-w-lg p-8 bg-slate-900/90 border-4 border-yellow-600 rounded-xl shadow-2xl">
            <h1 class="text-6xl text-yellow-400 mb-2 drop-shadow-lg">MAELSTROM</h1>
            <p class="text-xl text-gray-300 mb-8 italic">Survive the Sea. Outlast the Storm.</p>
            
            <div id="loading-status" class="text-yellow-200 mb-6 text-xl animate-pulse">Loading Fleet Assets...</div>
            
            <button id="start-btn" class="hidden w-full py-4 bg-gradient-to-r from-yellow-600 to-yellow-500 text-black text-3xl font-bold rounded hover:from-yellow-500 hover:to-yellow-400 transition-all shadow-[0_0_15px_rgba(202,138,4,0.5)]">
                SET SAIL
            </button>

            <div class="mt-8 text-sm text-gray-400 font-sans tracking-wide">
                <p>WASD / Arrows or Touch to Move</p>
                <p>Cannons auto-fire. Collect Doubloons to grow your armada.</p>
            </div>
        </div>
    </div>

    <!-- Level Up Screen -->
    <div id="levelup-screen" class="ui-layer interactive bg-black/70 flex flex-col items-center justify-center backdrop-blur-md hidden z-40">
        <h2 class="text-5xl text-blue-400 mb-8 drop-shadow-lg animate-bounce">LEVEL UP!</h2>
        <div id="upgrade-container" class="flex flex-wrap justify-center gap-6 max-w-4xl">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="ui-layer interactive bg-red-950/90 flex flex-col items-center justify-center backdrop-blur-md hidden z-50">
        <h1 class="text-7xl text-red-500 mb-4 drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">THE DEEP CLAIMS YOU</h1>
        <div class="text-3xl text-white mb-2">Survived: <span id="final-time" class="text-yellow-400"></span></div>
        <div class="text-2xl text-gray-300 mb-8">Doubloons Plundered: <span id="final-coins" class="text-yellow-400"></span></div>
        
        <button id="restart-btn" class="px-10 py-4 bg-red-700 text-white text-2xl font-bold rounded hover:bg-red-600 transition-all shadow-lg border-2 border-red-400">
            TRY AGAIN
        </button>
    </div>

    <!-- Damage Text Container -->
    <div id="floating-text-container" class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-30"></div>

<script>
/**
 * MAELSTROM - Single File Implementation
 * Engineered for robustness, performance, and immediate playability.
 */

// ==========================================
// 1. CORE GAME CONFIGURATION & STATE
// ==========================================
const CONFIG = {
    playerBaseSpeed: 12,
    playerBaseHP: 100,
    fireRateBase: 1.0, // seconds between shots
    projectileSpeed: 30,
    pickupRadius: 5,
    xpBaseNeeded: 50,
    xpMultiplier: 1.2,
    arenaSize: 200, // Virtual bounds logic
    poolSizes: {
        enemies: 150,
        projectiles: 200,
        drops: 200
    }
};

const STATE = {
    mode: 'loading', // loading, menu, playing, levelup, gameover
    time: 0,
    lastTime: 0,
    score: 0,
    level: 1,
    xp: 0,
    xpNeeded: CONFIG.xpBaseNeeded,
    wave: 1,
    bossActive: false,
    upgrades: {
        damageMult: 1.0,
        speedMult: 1.0,
        fireRateMult: 1.0,
        projectileCount: 1,
        pierce: 0
    },
    audioInitialized: false
};

// ==========================================
// 2. PROCEDURAL AUDIO SYSTEM
// ==========================================
let audioCtx;
const AudioSys = {
    init: function() {
        if (STATE.audioInitialized) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        STATE.audioInitialized = true;
    },
    play: function(type) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        switch(type) {
            case 'shoot':
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
                break;
            case 'hit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(20, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
                break;
            case 'coin':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, now);
                osc.frequency.setValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
                break;
            case 'levelup':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.1);
                osc.frequency.linearRampToValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
                break;
        }
    }
};

// ==========================================
// 3. ASSET LOADER & PROCEDURAL FALLBACKS
// ==========================================
const ASSETS = {};

// Use the absolute GitHub Pages URL to prevent 'Invalid URL' errors in iframe/blob execution contexts
const REPO_PATH = "https://abhishek2025-glitch.github.io/boat/assets/Models/GLB%20format/";

const MODEL_DEF = {
    player: 'ship-pirate-small.glb',
    enemy_row: 'boat-row-small.glb',
    enemy_sloop: 'ship-small.glb',
    boss: 'ship-ghost.glb',
    cannonball: 'cannon-ball.glb',
    chest: 'chest.glb'
};

// Generates blocky 3D models if fetching GLBs fail (CORS/Path issues)
function generateFallbackGeometry(type) {
    const group = new THREE.Group();
    let mesh;
    if (type === 'player') {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 4), new THREE.MeshStandardMaterial({color: 0x8b4513}));
        const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3), new THREE.MeshStandardMaterial({color: 0x5c4033}));
        mast.position.y = 2;
        group.add(mast);
    } else if (type === 'enemy_row') {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshStandardMaterial({color: 0xaa0000}));
    } else if (type === 'enemy_sloop') {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 3), new THREE.MeshStandardMaterial({color: 0x880000}));
    } else if (type === 'boss') {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 8), new THREE.MeshStandardMaterial({color: 0x00ff88, transparent: true, opacity: 0.8}));
    } else if (type === 'cannonball') {
        mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshStandardMaterial({color: 0x222222}));
    } else if (type === 'chest') {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.8), new THREE.MeshStandardMaterial({color: 0xffd700}));
    }
    
    if (mesh) {
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
    }
    return group;
}

async function loadAssets() {
    const loader = new THREE.GLTFLoader();
    const promises = Object.entries(MODEL_DEF).map(([key, filename]) => {
        return new Promise((resolve) => {
            loader.load(
                REPO_PATH + filename,
                (gltf) => {
                    // Normalize scale and rotation
                    const model = gltf.scene;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    ASSETS[key] = model;
                    resolve();
                },
                undefined,
                (error) => {
                    console.warn(`Failed to load ${filename}, using robust fallback geometry.`);
                    ASSETS[key] = generateFallbackGeometry(key);
                    resolve(); // Resolve anyway so game proceeds
                }
            );
        });
    });

    // Timeout safety net
    const timeout = new Promise(resolve => setTimeout(() => {
        console.warn("Asset load timeout. Injecting fallbacks.");
        Object.keys(MODEL_DEF).forEach(key => {
            if (!ASSETS[key]) ASSETS[key] = generateFallbackGeometry(key);
        });
        resolve();
    }, 5000));

    await Promise.race([Promise.all(promises), timeout]);
    
    document.getElementById('loading-status').classList.add('hidden');
    document.getElementById('start-btn').classList.remove('hidden');
}


// ==========================================
// 4. THREE.JS SCENE SETUP
// ==========================================
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Sky color
scene.fog = new THREE.Fog(0x87CEEB, 30, 100);

// Camera Setup (Isometric feel)
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 200);
const cameraOffset = new THREE.Vector3(0, 30, 25);
camera.position.copy(cameraOffset);
camera.lookAt(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
dirLight.position.set(20, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

// The Ocean (Procedural Vertex Animated Plane)
const oceanGeo = new THREE.PlaneGeometry(300, 300, 64, 64);
oceanGeo.rotateX(-Math.PI / 2);
const oceanMat = new THREE.MeshStandardMaterial({
    color: 0x1a6fa8,
    roughness: 0.1,
    metalness: 0.8,
    flatShading: true
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.receiveShadow = true;
scene.add(ocean);

// Save initial vertices for wave animation
const oceanInitZ = [];
const posAttribute = oceanGeo.attributes.position;
for(let i=0; i < posAttribute.count; i++) {
    oceanInitZ.push(posAttribute.getY(i)); 
}


// ==========================================
// 5. INPUT MANAGEMENT
// ==========================================
const Input = {
    keys: { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false },
    joyVec: new THREE.Vector2(0,0),
    isTouching: false,
    
    init: function() {
        window.addEventListener('keydown', e => { if(this.keys.hasOwnProperty(e.key)) this.keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(this.keys.hasOwnProperty(e.key)) this.keys[e.key] = false; });
        
        // Touch JoyStick
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        let origin = {x:0, y:0};

        document.addEventListener('touchstart', e => {
            if(STATE.mode !== 'playing') return;
            // Ignore touches on UI buttons or upgrade cards
            if(e.target.tagName === 'BUTTON' || e.target.closest('.upgrade-card')) return; 

            this.isTouching = true;
            const touch = e.touches[0];
            origin = {x: touch.clientX, y: touch.clientY};
            
            joyZone.style.display = 'block';
            // Center the 140px zone exactly on the touch coordinate
            joyZone.style.left = (origin.x - 70) + 'px';
            joyZone.style.top = (origin.y - 70) + 'px';
            
            joyKnob.classList.remove('released');
            joyKnob.style.transform = `translate(-50%, -50%)`;
            this.joyVec.set(0,0);
        }, {passive: false});

        document.addEventListener('touchmove', e => {
            if(!this.isTouching) return;
            e.preventDefault(); // Prevent pull-to-refresh and scrolling
            const touch = e.touches[0];
            let dx = touch.clientX - origin.x;
            let dy = touch.clientY - origin.y;
            
            const distance = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50; // Max distance knob can travel from center
            
            if(distance > maxDist) {
                dx = (dx/distance) * maxDist;
                dy = (dy/distance) * maxDist;
            }
            
            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            // Normalize for movement logic (0 to 1)
            this.joyVec.set(dx / maxDist, dy / maxDist);
        }, {passive: false});

        const endTouch = () => {
            if(!this.isTouching) return;
            this.isTouching = false;
            this.joyVec.set(0,0);
            
            // Trigger the spring-back animation
            joyKnob.classList.add('released');
            joyKnob.style.transform = `translate(-50%, -50%)`;
            
            // Hide the joystick base after the knob snaps back
            setTimeout(() => {
                if(!this.isTouching) joyZone.style.display = 'none';
            }, 200);
        };
        document.addEventListener('touchend', endTouch);
        document.addEventListener('touchcancel', endTouch);
    },
    
    getDirection: function() {
        let vec = new THREE.Vector3(0,0,0);
        if (this.keys.w || this.keys.ArrowUp) vec.z -= 1;
        if (this.keys.s || this.keys.ArrowDown) vec.z += 1;
        if (this.keys.a || this.keys.ArrowLeft) vec.x -= 1;
        if (this.keys.d || this.keys.ArrowRight) vec.x += 1;
        
        if (vec.lengthSq() > 0) {
            return vec.normalize();
        }
        
        if (this.joyVec.lengthSq() > 0) {
            return new THREE.Vector3(this.joyVec.x, 0, this.joyVec.y);
        }
        
        return vec;
    }
};


// ==========================================
// 6. OBJECT POOLING & ENTITIES
// ==========================================

// Player Entity
const Player = {
    mesh: null,
    hp: CONFIG.playerBaseHP,
    maxHp: CONFIG.playerBaseHP,
    pos: new THREE.Vector3(0, 0, 0),
    vel: new THREE.Vector3(0, 0, 0),
    targetRot: 0,
    lastFireTime: 0,
    
    init: function() {
        if(this.mesh) scene.remove(this.mesh);
        this.mesh = ASSETS.player.clone();
        this.mesh.scale.set(1.5, 1.5, 1.5);
        scene.add(this.mesh);
        
        this.pos.set(0,0,0);
        this.vel.set(0,0,0);
        this.hp = this.maxHp;
        this.lastFireTime = 0;
        this.updateTransform();
    },
    
    updateTransform: function() {
        this.mesh.position.copy(this.pos);
        // Smooth rotation
        if(this.vel.lengthSq() > 0.01) {
            this.targetRot = Math.atan2(this.vel.x, this.vel.z);
        }
        
        // Simple lerp angle
        let diff = this.targetRot - this.mesh.rotation.y;
        while(diff < -Math.PI) diff += Math.PI*2;
        while(diff > Math.PI) diff -= Math.PI*2;
        this.mesh.rotation.y += diff * 0.1;
        
        // Tilt based on movement
        this.mesh.rotation.z = -this.vel.x * 0.1;
        this.mesh.rotation.x = this.vel.z * 0.1;
    },
    
    takeDamage: function(amt) {
        this.hp -= amt;
        updateHUD();
        // Visual flash
        this.mesh.position.y -= 0.5; // slight dip
        if(this.hp <= 0) gameOver();
    }
};

// Generic Pool Class
class ObjectPool {
    constructor(assetKey, count, scale = 1.0) {
        this.pool = [];
        this.active = [];
        const template = ASSETS[assetKey];
        
        for(let i=0; i<count; i++) {
            const mesh = template.clone();
            mesh.scale.set(scale, scale, scale);
            mesh.visible = false;
            scene.add(mesh);
            this.pool.push({
                mesh: mesh,
                active: false,
                pos: new THREE.Vector3(),
                vel: new THREE.Vector3(),
                hp: 10,
                type: assetKey,
                spawnTime: 0
            });
        }
    }
    
    spawn(x, z, config = {}) {
        const item = this.pool.find(i => !i.active);
        if(!item) return null; // Pool exhausted
        
        item.active = true;
        item.mesh.visible = true;
        item.pos.set(x, 0, z);
        item.mesh.position.copy(item.pos);
        item.hp = config.hp || 10;
        item.spawnTime = STATE.time;
        Object.assign(item, config); // Apply specific config
        this.active.push(item);
        return item;
    }
    
    kill(item) {
        item.active = false;
        item.mesh.visible = false;
        this.active = this.active.filter(i => i !== item);
    }
    
    clearAll() {
        this.active.forEach(item => {
            item.active = false;
            item.mesh.visible = false;
        });
        this.active = [];
    }
}

let enemyPool, projPool, dropPool;


// ==========================================
// 7. GAMEPLAY LOGIC & SYSTEMS
// ==========================================

function spawnEnemyWave() {
    // Increase difficulty over time
    const spawnCount = Math.floor(2 + (STATE.time / 30));
    const dist = 35; // Spawn just outside camera view
    
    for(let i=0; i<spawnCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const ex = Player.pos.x + Math.cos(angle) * dist;
        const ez = Player.pos.z + Math.sin(angle) * dist;
        
        let type = 'enemy_row';
        let hp = 30 * STATE.wave;
        let speed = 4;
        let value = 10;
        let scale = 1.2;

        if (STATE.time > 60 && Math.random() < 0.3) {
            type = 'enemy_sloop';
            hp = 80 * STATE.wave;
            speed = 3;
            value = 25;
            scale = 1.8;
        }

        // Check boss wave
        if (STATE.time > 0 && Math.floor(STATE.time) % 180 === 0 && !STATE.bossActive) {
            type = 'boss';
            hp = 1000 * STATE.wave;
            speed = 2;
            value = 200;
            scale = 3.0;
            STATE.bossActive = true;
            uiShowMessage("GHOST SHIP APPEARED!", "#10b981");
        }

        const enemy = enemyPool.spawn(ex, ez, { maxHp: hp, hp: hp, speed: speed, value: value, enemyType: type });
        if(enemy) {
            // Hot swap mesh scale/type logic requires pool per type or uniform scaling.
            // For single-file simplicity, we apply scale dynamically.
            enemy.mesh.scale.set(scale, scale, scale);
        }
    }
}

function fireWeapons() {
    if (STATE.time - Player.lastFireTime < (CONFIG.fireRateBase / STATE.upgrades.fireRateMult)) return;
    
    // Find closest enemies
    if (enemyPool.active.length === 0) return;
    
    const targets = [...enemyPool.active].sort((a,b) => 
        a.pos.distanceToSquared(Player.pos) - b.pos.distanceToSquared(Player.pos)
    );

    const rangeSq = 40 * 40;
    if (targets[0].pos.distanceToSquared(Player.pos) > rangeSq) return; // Out of range

    AudioSys.play('shoot');
    Player.lastFireTime = STATE.time;

    const numShots = STATE.upgrades.projectileCount;
    for(let i=0; i<numShots; i++) {
        const target = targets[i % targets.length]; // Spread if multiple shots
        
        // Predict target position slightly
        const dist = target.pos.distanceTo(Player.pos);
        const flightTime = dist / CONFIG.projectileSpeed;
        const predictPos = target.pos.clone().add(target.vel.clone().multiplyScalar(flightTime));
        
        const dir = predictPos.sub(Player.pos).normalize();
        // Add slight spread if multiple
        if(numShots > 1) {
            const spread = (Math.random() - 0.5) * 0.2;
            dir.applyAxisAngle(new THREE.Vector3(0,1,0), spread);
        }

        projPool.spawn(Player.pos.x, Player.pos.z, {
            vel: dir.multiplyScalar(CONFIG.projectileSpeed),
            damage: 25 * STATE.upgrades.damageMult,
            pierce: STATE.upgrades.pierce
        });
    }
}

function showDamageText(x, y, amount, color="white") {
    const el = document.createElement('div');
    el.className = 'damage-text';
    el.innerText = Math.round(amount);
    el.style.color = color;
    
    // Project 3D pos to 2D screen
    const pos = new THREE.Vector3(x, 0, y);
    pos.project(camera);
    
    const xPos = (pos.x * .5 + .5) * window.innerWidth;
    const yPos = (pos.y * -.5 + .5) * window.innerHeight;
    
    el.style.left = `${xPos}px`;
    el.style.top = `${yPos}px`;
    
    document.getElementById('floating-text-container').appendChild(el);
    setTimeout(() => el.remove(), 800);
}


function checkCollisions() {
    // Projectiles vs Enemies
    for(let i = projPool.active.length - 1; i >= 0; i--) {
        const p = projPool.active[i];
        let hit = false;
        
        for(let j = enemyPool.active.length - 1; j >= 0; j--) {
            const e = enemyPool.active[j];
            const distSq = p.pos.distanceToSquared(e.pos);
            
            // simple radius check
            if (distSq < 4) { 
                e.hp -= p.damage;
                showDamageText(e.pos.x, e.pos.z, p.damage);
                AudioSys.play('hit');
                
                // knockback
                e.pos.add(p.vel.clone().normalize().multiplyScalar(0.5));
                
                if (e.hp <= 0) {
                    // Die
                    if(e.enemyType === 'boss') STATE.bossActive = false;
                    dropPool.spawn(e.pos.x, e.pos.z, { value: e.value });
                    enemyPool.kill(e);
                }
                
                if (p.pierce > 0) {
                    p.pierce--;
                } else {
                    projPool.kill(p);
                    hit = true;
                    break;
                }
            }
        }
    }
    
    // Player vs Enemies (Contact damage)
    for(let e of enemyPool.active) {
        if(e.pos.distanceToSquared(Player.pos) < 5) {
            Player.takeDamage(10 * STATE.wave * (1/60)); // DPS
        }
    }
    
    // Player vs Drops (Magnetic pickup)
    const magnetRadiusSq = (CONFIG.pickupRadius * 2) * (CONFIG.pickupRadius * 2);
    for(let i = dropPool.active.length - 1; i >= 0; i--) {
        const d = dropPool.active[i];
        const distSq = d.pos.distanceToSquared(Player.pos);
        
        if (distSq < magnetRadiusSq) {
            // Move toward player
            const dir = Player.pos.clone().sub(d.pos).normalize();
            d.pos.add(dir.multiplyScalar(0.5));
            
            if (distSq < 2) {
                // Collect
                STATE.xp += d.value;
                STATE.score += d.value;
                AudioSys.play('coin');
                showDamageText(Player.pos.x, Player.pos.z, `+${d.value}`, "#ffd700");
                dropPool.kill(d);
                checkLevelUp();
                updateHUD();
            }
        }
    }
}


// ==========================================
// 8. UI & PROGRESSION
// ==========================================

const UPGRADE_TYPES = [
    { id: 'dmg', name: "Heavy Cannons", desc: "+25% Damage", apply: () => STATE.upgrades.damageMult += 0.25 },
    { id: 'rate', name: "Swift Gunner", desc: "+20% Fire Rate", apply: () => STATE.upgrades.fireRateMult += 0.20 },
    { id: 'multi', name: "Extra Cannon", desc: "+1 Cannonball", apply: () => STATE.upgrades.projectileCount += 1 },
    { id: 'speed', name: "Stolen Sails", desc: "+15% Speed", apply: () => { STATE.upgrades.speedMult += 0.15; Player.speed *= 1.15; } },
    { id: 'heal', name: "Rum Ration", desc: "Heal 50% HP", apply: () => { Player.hp = Math.min(Player.maxHp, Player.hp + Player.maxHp*0.5); } },
    { id: 'pierce', name: "Ghost Breaker", desc: "Cannons pierce 1 target", apply: () => STATE.upgrades.pierce += 1 }
];

function checkLevelUp() {
    if (STATE.xp >= STATE.xpNeeded) {
        STATE.xp -= STATE.xpNeeded;
        STATE.level++;
        STATE.xpNeeded = Math.floor(STATE.xpNeeded * CONFIG.xpMultiplier);
        
        STATE.mode = 'levelup';
        AudioSys.play('levelup');
        
        // Pick 3 random upgrades
        const shuffled = [...UPGRADE_TYPES].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 3);
        
        const container = document.getElementById('upgrade-container');
        container.innerHTML = '';
        
        choices.forEach(choice => {
            const el = document.createElement('div');
            el.className = 'upgrade-card p-6 w-64 text-center rounded-lg shadow-xl';
            el.innerHTML = `
                <div class="text-2xl text-yellow-400 mb-2 font-bold">${choice.name}</div>
                <div class="text-white">${choice.desc}</div>
            `;
            el.onclick = () => {
                choice.apply();
                document.getElementById('levelup-screen').classList.add('hidden');
                STATE.mode = 'playing';
                updateHUD();
            };
            container.appendChild(el);
        });
        
        document.getElementById('levelup-screen').classList.remove('hidden');
    }
}

function updateHUD() {
    document.getElementById('hp-fill').style.width = `${Math.max(0, (Player.hp / Player.maxHp) * 100)}%`;
    document.getElementById('xp-fill').style.width = `${Math.min(100, (STATE.xp / STATE.xpNeeded) * 100)}%`;
    document.getElementById('level-display').innerText = STATE.level;
    document.getElementById('coin-display').innerText = STATE.score;
    document.getElementById('wave-display').innerText = STATE.wave;
    
    // Format Time
    const mins = Math.floor(STATE.time / 60).toString().padStart(2, '0');
    const secs = Math.floor(STATE.time % 60).toString().padStart(2, '0');
    document.getElementById('timer-display').innerText = `${mins}:${secs}`;
}

function uiShowMessage(msg, color="white") {
    const el = document.createElement('div');
    el.innerText = msg;
    el.style.position = 'absolute';
    el.style.top = '20%';
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = '3rem';
    el.style.color = color;
    el.style.textShadow = '4px 4px 0 #000';
    el.style.pointerEvents = 'none';
    el.style.zIndex = '100';
    el.style.animation = 'floatUp 2s forwards';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
}


function gameOver() {
    STATE.mode = 'gameover';
    document.getElementById('gameover-screen').classList.remove('hidden');
    
    const mins = Math.floor(STATE.time / 60).toString().padStart(2, '0');
    const secs = Math.floor(STATE.time % 60).toString().padStart(2, '0');
    document.getElementById('final-time').innerText = `${mins}:${secs}`;
    document.getElementById('final-coins').innerText = STATE.score;
}

function resetGame() {
    enemyPool.clearAll();
    projPool.clearAll();
    dropPool.clearAll();
    
    STATE.time = 0;
    STATE.score = 0;
    STATE.level = 1;
    STATE.xp = 0;
    STATE.xpNeeded = CONFIG.xpBaseNeeded;
    STATE.wave = 1;
    STATE.bossActive = false;
    STATE.upgrades = { damageMult: 1.0, speedMult: 1.0, fireRateMult: 1.0, projectileCount: 1, pierce: 0 };
    
    Player.init();
    
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    STATE.mode = 'playing';
    STATE.lastTime = performance.now();
    updateHUD();
}


// ==========================================
// 9. MAIN GAME LOOP
// ==========================================

function animate(currentTime) {
    requestAnimationFrame(animate);
    
    const dt = Math.min((currentTime - STATE.lastTime) / 1000, 0.1); // cap dt
    STATE.lastTime = currentTime;
    
    // Animate Ocean Waves always
    const timeSec = currentTime * 0.001;
    for(let i=0; i < posAttribute.count; i++) {
        const x = posAttribute.getX(i);
        const y = posAttribute.getY(i);
        const wave = Math.sin(x * 0.2 + timeSec) * Math.cos(y * 0.2 + timeSec) * 0.5;
        posAttribute.setZ(i, oceanInitZ[i] + wave);
    }
    posAttribute.needsUpdate = true;
    
    if (STATE.mode !== 'playing') {
        renderer.render(scene, camera);
        return;
    }
    
    STATE.time += dt;
    STATE.wave = 1 + Math.floor(STATE.time / 60);

    // 1. Player Movement
    const dir = Input.getDirection();
    Player.vel.copy(dir).multiplyScalar(CONFIG.playerBaseSpeed * STATE.upgrades.speedMult);
    Player.pos.add(Player.vel.clone().multiplyScalar(dt));
    Player.updateTransform();

    // 2. Camera & Ocean Follow
    camera.position.lerp(
        new THREE.Vector3(Player.pos.x + cameraOffset.x, cameraOffset.y, Player.pos.z + cameraOffset.z),
        5 * dt
    );
    camera.lookAt(Player.pos);
    
    // Snap ocean to integer grid to create infinite illusion
    ocean.position.x = Math.round(Player.pos.x / 10) * 10;
    ocean.position.z = Math.round(Player.pos.z / 10) * 10;

    // 3. Spawning
    if (Math.random() < dt * 1.5) spawnEnemyWave();

    // 4. Update Entities
    // Enemies follow player
    for(let e of enemyPool.active) {
        const moveDir = Player.pos.clone().sub(e.pos).normalize();
        e.vel.copy(moveDir).multiplyScalar(e.speed);
        e.pos.add(e.vel.clone().multiplyScalar(dt));
        e.mesh.position.copy(e.pos);
        e.mesh.rotation.y = Math.atan2(e.vel.x, e.vel.z);
        // Bobbing
        e.mesh.position.y = Math.sin(STATE.time * 2 + e.pos.x) * 0.2;
    }
    
    // Projectiles
    for(let p of projPool.active) {
        p.pos.add(p.vel.clone().multiplyScalar(dt));
        p.mesh.position.copy(p.pos);
        // Spin
        p.mesh.rotation.x += 10 * dt;
        // Gravity Arc approximation
        const life = STATE.time - p.spawnTime;
        p.mesh.position.y = Math.max(0, 1.5 - (life * life * 5)); // Parabola
        
        if (life > 2) projPool.kill(p);
    }
    
    // Drops (Bobbing)
    for(let d of dropPool.active) {
        d.mesh.rotation.y += 2 * dt;
        d.mesh.position.y = 0.5 + Math.sin(STATE.time * 5 + d.pos.x) * 0.2;
        
        if (STATE.time - d.spawnTime > 15) dropPool.kill(d); // Despawn after 15s
    }

    // 5. Combat & Collisions
    fireWeapons();
    checkCollisions();
    
    // Update UI occasionally
    if(Math.floor(currentTime) % 10 === 0) updateHUD();

    renderer.render(scene, camera);
}

// Window resize handling
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});


// ==========================================
// 10. BOOTSTRAP
// ==========================================

document.getElementById('start-btn').addEventListener('click', () => {
    AudioSys.init();
    
    // Init Pools
    enemyPool = new ObjectPool('enemy_row', CONFIG.poolSizes.enemies);
    projPool = new ObjectPool('cannonball', CONFIG.poolSizes.projectiles, 0.5);
    dropPool = new ObjectPool('chest', CONFIG.poolSizes.drops, 0.8);
    
    Input.init();
    
    document.getElementById('start-screen').classList.add('hidden');
    resetGame();
});

document.getElementById('restart-btn').addEventListener('click', resetGame);

// Kickoff
loadAssets().then(() => {
    // Start animation loop immediately (runs rendering in background)
    STATE.lastTime = performance.now();
    animate(STATE.lastTime);
});

</script>
